name: Lighthouse CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Use build:demo (not build) because measurements require MSW to be
      # active for realistic data load. The standard production build serves
      # an empty shell with no data source.
      - name: Build demo bundle (MSW enabled, 10k mock transactions)
        run: npm run build:demo

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.15.x autorun

      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const linksPath = '.lighthouseci/links.json';
            const assertionsPath = '.lighthouseci/assertion-results.json';

            const links = fs.existsSync(linksPath)
              ? JSON.parse(fs.readFileSync(linksPath, 'utf8'))
              : {};
            const assertions = fs.existsSync(assertionsPath)
              ? JSON.parse(fs.readFileSync(assertionsPath, 'utf8'))
              : [];

            const failed = assertions.filter(a => a.level === 'error' && !a.passed);
            const warned = assertions.filter(a => a.level === 'warn' && !a.passed);

            const urlRows = Object.entries(links)
              .map(([u, report]) => `| \`${new URL(u).pathname}\` | [report](${report}) |`)
              .join('\n');

            const status = failed.length === 0
              ? '✅ Passed'
              : `❌ ${failed.length} assertion(s) failed`;

            const body = [
              `## Lighthouse CI — ${status}`,
              '',
              `| Route | Report |`,
              `|-------|--------|`,
              urlRows || '_(no reports — collect step may have failed)_',
              '',
              failed.length
                ? `**Failures:** ${failed.map(f => `\`${f.auditId}\``).join(', ')}`
                : '',
              warned.length
                ? `**Warnings:** ${warned.map(w => `\`${w.auditId}\``).join(', ')}`
                : '',
            ].filter(Boolean).join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const existing = await github.rest.issues.listComments({ owner, repo, issue_number });
            const prior = existing.data.find(
              c => c.user.type === 'Bot' && c.body.startsWith('## Lighthouse CI'),
            );

            if (prior) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
